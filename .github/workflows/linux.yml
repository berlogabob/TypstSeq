name: Linux build

on:
  push:
    branches: [TySeqNotLogSeq]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libstdc++-12-dev
      - run: ./tool/setup_typst_native.sh
      - run: flutter build linux
