name: Android build

on:
  push:
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          cache: true
      - uses: typst-community/setup-typst@v5
        with:
          typst-version: 0.15.0
      - name: Verify TyLog Format v1 and Typst package
        run: |
          typst compile --root typst/tylog typst/tylog/examples/basic.typ /tmp/tylog-example.pdf
          (
            cd test/fixtures/tylog_format_v1
            typst eval 'query(metadata)' --root . --in valid.typ > /tmp/tylog-metadata.json
          )
          for entity in note link tag date attachment task; do
            grep -q "\"label\":\"<tylog-$entity>\"" /tmp/tylog-metadata.json
          done
          grep -q '"schema":1' /tmp/tylog-metadata.json
      - name: Test Flutter-independent core and CLI
        working-directory: packages/tylog_core
        run: |
          dart pub get
          dart test
      - run: ./tool/setup_typst_native.sh
      - name: Analyze Flutter app
        run: flutter analyze
      - name: Test Flutter app
        run: flutter test
      - name: Configure release signing
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/tylog-release.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=tylog-release.jks\n' \
            "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > android/key.properties
      - name: Build APK
        run: |
          if [[ "${{ github.event_name }}" == pull_request ]]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: tylog-android-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-*.apk
          retention-days: 14
      - name: Publish tagged APK
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/tylog-android.apk
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "Release ${TAG#v}" --notes "TyLog ${TAG#v}"
          gh release upload "$TAG" \
            build/app/outputs/flutter-apk/tylog-android.apk --clobber
