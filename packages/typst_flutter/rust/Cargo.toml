[package]
name = "typst_flutter"
version = "2.2.1"
edition = "2024"
description = "Native Typst typesetting compiler for Flutter via Rust FFI"
license = "Apache-2.0"

[lib]
name = "typst_flutter"
crate-type = ["cdylib", "staticlib"]

[dependencies]
typst = "0.15.0"
typst-pdf = "0.15.0"
typst-render = "0.15.0"
typst-svg = "0.15.0"
typst-eval = "0.15.0"
serde_json = "1.0"
typst-layout = "0.15.0"
typst-utils = "0.15.0"
comemo = "0.5.1"
flutter_rust_bridge = "=2.12.0"
time = "0.3.47"

[profile.release]
opt-level = "z"      # optimise for binary size
lto = "thin"         # cross-crate link-time optimisation (smaller binaries)
codegen-units = 1    # maximum intra-crate optimisation (thin LTO handles parallelism)
strip = true         # strip debug symbols from the output
panic = "abort"      # smaller binary: no unwinding tables
